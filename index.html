  document.getElementById('refetch-go').addEventListener('click', async () => {
    if (!refetchTargetId) return;
    const btn = document.getElementById('refetch-go');
    const instructions = document.getElementById('refetch-instructions').value.trim();
    btn.disabled = true;
    btn.textContent = 'Fetching…';
    try {
      const res = await fetch(window.collectionHelpers.refetchUrl(activeCollection, refetchTargetId), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ instructions, analysisAgent: selectedAnalysisAgent() }),
      });
      const updated = await res.json();
      if (!res.ok) { alert(updated.error || 'Refetch failed'); return; }
      const idx = bookmarks.findIndex(b => b.id === updated.id);
      if (idx !== -1) bookmarks[idx] = updated;
      if (activeCollection === 'inspiration') buildTagCloud();
      applyFilters();
      closeRefetchPopover();
    } finally {
      btn.disabled = false;
      btn.textContent = 'Refetch';
    }
  });

  document.getElementById('refetch-instructions').addEventListener('keydown', e => {
    if (e.key === 'Escape') closeRefetchPopover();
  });

  // ── Delete popover ──
  let deleteTargetId = null;

  function openDeletePopover(id) {
    deleteTargetId = id;
    const b = bookmarks.find(x => x.id === id);
    document.getElementById('delete-title').textContent = b?.title || id;
    const popover = document.getElementById('delete-popover');
    popover.style.top = '120px';
    popover.style.left = '50%';
    popover.style.transform = 'translateX(-50%)';
    popover.classList.add('open');
  }

  function closeDeletePopover() {
    document.getElementById('delete-popover').classList.remove('open');
    deleteTargetId = null;
  }

  document.getElementById('delete-cancel').addEventListener('click', closeDeletePopover);

  document.getElementById('delete-confirm').addEventListener('click', async () => {
    if (!deleteTargetId) return;
    await fetch(window.collectionHelpers.itemUrl(activeCollection, deleteTargetId), { method: 'DELETE' });
    bookmarks = bookmarks.filter(b => b.id !== deleteTargetId);
    closeDeletePopover();
    if (activeCollection === 'inspiration') buildTagCloud();
    else renderLibraryTopicCloud();
    applyFilters();
  });

  // Close all popovers helper
  function closeAllPopovers() {
    closeCtxMenu();
    closeRefetchPopover();
    closeDeletePopover();
    closeFavPopover();
    closeAgentMenu();
  }

  // Stop propagation inside popovers so outside-click doesn't fire
  document.getElementById('refetch-popover').addEventListener('click', e => e.stopPropagation());
  document.getElementById('delete-popover').addEventListener('click', e => e.stopPropagation());
  document.getElementById('ctx-menu').addEventListener('click', e => e.stopPropagation());
  document.getElementById('agent-menu').addEventListener('click', e => e.stopPropagation());

  // Dismiss on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('#ctx-menu') && !e.target.closest('.more-btn') && !e.target.closest('.more-btn-list')) {
      closeCtxMenu();
    }
    if (!e.target.closest('#refetch-popover')) closeRefetchPopover();
    if (!e.target.closest('#delete-popover')) closeDeletePopover();
    if (!e.target.closest('#add-action')) closeAgentMenu();
  });

  document.getElementById('fav-filter-btn').addEventListener('click', () => {
    showFavoritesOnly = !showFavoritesOnly;
    document.getElementById('fav-filter-btn').classList.toggle('active', showFavoritesOnly);
    applyFilters();
  });

  document.getElementById('clear-filters-btn').addEventListener('click', () => {
    document.getElementById('search').value = '';
    document.getElementById('audience-filter').value = '';
    document.getElementById('form-filter').value = '';
    document.getElementById('domain-filter').value = '';
    activeTiers.clear();
    document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
    showFavoritesOnly = false;
    document.getElementById('fav-filter-btn').classList.remove('active');
    activeTag = null;
    libraryTopicFilter = '';
    libraryTypeFilter = '';
    const libTypeEl = document.getElementById('library-type-filter');
    if (libTypeEl) libTypeEl.value = '';
    if (activeCollection === 'inspiration') buildTagCloud();
    else renderLibraryTopicCloud();
    applyFilters();
  });

  document.getElementById('library-type-filter').addEventListener('change', e => {
    libraryTypeFilter = e.target.value;
    applyFilters();
  });

  document.getElementById('add-btn').addEventListener('click', addBookmark);
  document.getElementById('add-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addBookmark();
  });

  document.getElementById('search').addEventListener('input', applyFilters);
  document.getElementById('audience-filter').addEventListener('change', applyFilters);
  document.getElementById('form-filter').addEventListener('change', applyFilters);
  document.getElementById('domain-filter').addEventListener('change', applyFilters);
  document.getElementById('sort-select').addEventListener('change', applyFilters);

  document.querySelectorAll('.tier-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.tier;
      if (activeTiers.has(t)) { activeTiers.delete(t); btn.classList.remove('active'); }
      else { activeTiers.add(t); btn.classList.add('active'); }
      applyFilters();
    });
  });

  document.getElementById('btn-grid').addEventListener('click', () => {
    activeView = 'grid';
    document.getElementById('btn-grid').classList.add('active');
    document.getElementById('btn-list').classList.remove('active');
    document.getElementById('grid-view').style.display = '';
    document.getElementById('list-view').style.display = 'none';
    render();
  });

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
    document.documentElement.dataset.theme = next;
    localStorage.setItem('theme', next);
  });

  document.getElementById('btn-list').addEventListener('click', () => {
    activeView = 'list';
    document.getElementById('btn-list').classList.add('active');
    document.getElementById('btn-grid').classList.remove('active');
    document.getElementById('grid-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    render();
  });

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeModal();
      closeAgentMenu();
    }
  });

  initAnalysisAgentControl();
  // load() is called by the module script below after collectionHelpers are initialized
</script>
<script type="module">
  import { resolveActiveCollection, itemsUrl, itemUrl, addUrl, refetchUrl, screenshotUrl, eventsUrl, collectionChrome, matchesLibraryFilters, topicCounts, selectView, itemFieldEntries, buildFilters, matchesFilters, applySseEvent, renderEnrichmentState, boardPurpose, renderEmptyState, shouldShowEnableAiNudge } from './collections-ui.js';
  window.collectionHelpers = { resolveActiveCollection, itemsUrl, itemUrl, addUrl, refetchUrl, screenshotUrl, eventsUrl, collectionChrome, matchesLibraryFilters, topicCounts, selectView, itemFieldEntries, buildFilters, matchesFilters, applySseEvent, renderEnrichmentState, boardPurpose, renderEmptyState, shouldShowEnableAiNudge };
  // Story 7.2: generic descriptor-driven field renderer (Epic 8 wires it into the
  // descriptor-driven card/modal when the UI consumes the SQLite item model).
  import { renderField, renderFields, renderAsset, isSafeUrl } from './descriptor/render-map.js';
  window.renderHelpers = { renderField, renderFields, renderAsset, isSafeUrl };
  load();
</script>
</body>
</html>

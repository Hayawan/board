<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board</title>
  <link rel="icon" href="/favicon.png" type="image/png" />
  <!-- Story 13.3: PWA install + Web Share Target. Manifest declares the share_target;
       the service worker is registered additively and is scoped so it never intercepts
       /api, /events (SSE), /screenshots, or /share (see sw.js). -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0c0c0c" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
  <script>
    (() => {
      const stored = localStorage.getItem('theme');
      const theme = stored || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <style>
    :root {
      --bg: #0c0c0c;
      --surface: #141414;
      --surface-2: #1a1a1a;
      --border: #222;
      --border-hover: #333;
      --text: #f0f0f0;
      --text-2: #888;
      --text-3: #555;
      --accent: #f59e0b;
      --accent-dim: rgba(245, 158, 11, 0.12);
      --structural: #7c3aed;
      --polish: #059669;
      --reference: #0ea5e9;
      --header-bg: rgba(12, 12, 12, 0.92);
      --radius: 10px;
      --radius-sm: 6px;
    }

    [data-theme="light"] {
      --bg: #fafafa;
      --surface: #ffffff;
      --surface-2: #f4f4f4;
      --border: #e5e5e5;
      --border-hover: #cccccc;
      --text: #111;
      --text-2: #555;
      --text-3: #999;
      --accent-dim: rgba(245, 158, 11, 0.18);
      --header-bg: rgba(250, 250, 250, 0.92);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-row-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      min-width: 0;
    }

    .logo {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
      flex-shrink: 0;
    }

    .logo span { color: var(--accent); }

    .search {
      flex: 1;
      max-width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search:focus { border-color: var(--accent); }
    .search::placeholder { color: var(--text-3); }

    .filters {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    select.filter-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      color: var(--text-2);
      font-size: 12px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    select.filter-select:focus { border-color: var(--accent); color: var(--text); }
    select.filter-select.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .tier-filters {
      display: flex;
      gap: 4px;
    }

    .tier-btn {
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-3);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tier-btn:hover { border-color: var(--border-hover); color: var(--text-2); }
    .tier-btn.active[data-tier="structural"] { background: rgba(124,58,237,0.15); border-color: var(--structural); color: var(--structural); }
    .tier-btn.active[data-tier="polish"] { background: rgba(5,150,105,0.15); border-color: var(--polish); color: var(--polish); }
    .tier-btn.active[data-tier="reference"] { background: rgba(14,165,233,0.15); border-color: var(--reference); color: var(--reference); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .count { color: var(--text-3); font-size: 12px; white-space: nowrap; }

    .view-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .view-btn {
      padding: 6px 10px;
      background: transparent;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
    }
    .view-btn:hover { color: var(--text-2); }
    .view-btn.active { background: var(--surface-2); color: var(--text); }

    .view-btn svg { width: 15px; height: 15px; }

    .theme-toggle {
      padding: 6px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-3);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
    }
    .theme-toggle:hover { color: var(--text-2); border-color: var(--border-hover); }
    .theme-toggle svg { width: 15px; height: 15px; }
    .theme-toggle .sun-icon { display: block; }
    .theme-toggle .moon-icon { display: none; }
    [data-theme="light"] .theme-toggle .sun-icon { display: none; }
    [data-theme="light"] .theme-toggle .moon-icon { display: block; }

    /* ── Add bar ── */
    .add-bar {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .add-input {
      width: 260px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, width 0.2s;
    }
    .add-input:focus { border-color: var(--accent); width: 340px; }
    .add-input::placeholder { color: var(--text-3); }
    .add-input:disabled { opacity: 0.5; }

    .add-action {
      position: relative;
      display: flex;
      flex-shrink: 0;
    }

    .add-button-group {
      display: flex;
      overflow: hidden;
      border-radius: var(--radius-sm);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
    }

    .add-btn,
    .agent-menu-btn {
      padding: 7px 13px;
      background: var(--accent);
      color: #000;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
    }
    .add-btn:hover,
    .agent-menu-btn:hover { background: #fbbf24; }
    .add-btn:disabled,
    .agent-menu-btn:disabled { opacity: 0.5; cursor: default; }

    .agent-menu-btn {
      width: 32px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid rgba(0,0,0,0.22);
    }
    .agent-menu-btn svg { width: 14px; height: 14px; }

    .agent-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 500;
      width: 178px;
      padding: 5px;
      display: none;
      background: var(--surface-2);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 32px rgba(0,0,0,0.42);
    }
    .agent-menu.open { display: block; }
    .agent-option {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 8px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: var(--text-2);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
    }
    .agent-option:hover { background: var(--border); color: var(--text); }
    .agent-option[aria-checked="true"] { color: var(--accent); }
    .agent-menu-header {
      padding: 6px 8px 8px;
      margin-bottom: 4px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-3);
      white-space: nowrap;
    }
    .agent-option[aria-checked="true"]::after {
      content: "✓";
      font-size: 11px;
      color: var(--accent);
    }

    .add-status {
      font-size: 12px;
      color: var(--text-3);
      white-space: nowrap;
    }
    .add-status.error { color: #f87171; }

    /* ── Favorite button ── */
    .fav-btn {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      z-index: 2;
    }
    .fav-btn:hover { background: rgba(0,0,0,0.65); transform: scale(1.1); }
    .fav-btn svg { width: 14px; height: 14px; pointer-events: none; }
    .fav-btn .heart-outline { fill: none; stroke: rgba(255,255,255,0.7); stroke-width: 1.8; }
    .fav-btn.active { background: rgba(236,72,153,0.25); border-color: rgba(236,72,153,0.4); }
    .fav-btn.active .heart-outline { fill: #ec4899; stroke: #ec4899; }

    /* ── Favorite popover ── */
    .fav-popover {
      position: fixed;
      z-index: 300;
      background: var(--surface-2);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius);
      padding: 12px;
      width: 220px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
    }
    .fav-popover.open { display: block; }
    .fav-popover-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #ec4899;
      margin-bottom: 7px;
    }
    .fav-popover textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 9px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      line-height: 1.4;
      resize: none;
      height: 64px;
      outline: none;
      transition: border-color 0.15s;
    }
    .fav-popover textarea:focus { border-color: #ec4899; }
    .fav-popover textarea::placeholder { color: var(--text-3); }
    .fav-popover-footer {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 8px;
    }
    .fav-popover-footer button {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: none;
    }
    .fav-save { background: #ec4899; color: #fff; }
    .fav-save:hover { background: #db2777; }
    .fav-cancel { background: transparent; border: 1px solid var(--border) !important; color: var(--text-3); }
    .fav-cancel:hover { color: var(--text); }

    /* ── More (…) button & dropdown ── */
    .more-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      z-index: 2;
      color: rgba(255,255,255,0.8);
      font-size: 15px;
      line-height: 1;
      letter-spacing: 1px;
    }
    .more-btn:hover { background: rgba(0,0,0,0.65); }

    .more-btn-list {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-3);
      font-size: 15px;
      letter-spacing: 1px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .more-btn-list:hover { background: var(--surface-2); border-color: var(--border); color: var(--text-2); }

    .ctx-menu {
      position: fixed;
      z-index: 400;
      background: var(--surface-2);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius);
      padding: 4px;
      min-width: 140px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
    }
    .ctx-menu.open { display: block; }
    .ctx-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-2);
      transition: background 0.1s, color 0.1s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .ctx-item:hover { background: var(--border); color: var(--text); }
    .ctx-item.danger { color: #f87171; }
    .ctx-item.danger:hover { background: rgba(248,113,113,0.12); color: #f87171; }
    .ctx-item svg { width: 13px; height: 13px; flex-shrink: 0; opacity: 0.7; }

    /* ── Refetch popover ── */
    .refetch-popover {
      position: fixed;
      z-index: 400;
      background: var(--surface-2);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius);
      padding: 12px;
      width: 260px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
    }
    .refetch-popover.open { display: block; }
    .refetch-popover-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-3);
      margin-bottom: 7px;
    }
    .refetch-popover textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 9px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      line-height: 1.4;
      resize: none;
      height: 72px;
      outline: none;
      transition: border-color 0.15s;
    }
    .refetch-popover textarea:focus { border-color: var(--accent); }
    .refetch-popover textarea::placeholder { color: var(--text-3); }
    .refetch-footer {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 8px;
    }
    .refetch-footer button {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: none;
    }
    .refetch-go { background: var(--accent); color: #000; }
    .refetch-go:hover { background: #fbbf24; }
    .refetch-go:disabled { opacity: 0.5; cursor: default; }
    .refetch-x { background: transparent; border: 1px solid var(--border) !important; color: var(--text-3); }
    .refetch-x:hover { color: var(--text); }

    /* ── Delete confirmation popover ── */
    .delete-popover {
      position: fixed;
      z-index: 400;
      background: var(--surface-2);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: var(--radius);
      padding: 14px;
      width: 220px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
    }
    .delete-popover.open { display: block; }
    .delete-popover p { font-size: 13px; color: var(--text-2); margin-bottom: 12px; line-height: 1.4; }
    .delete-popover p strong { color: var(--text); }
    .delete-footer { display: flex; gap: 6px; justify-content: flex-end; }
    .delete-footer button {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: none;
    }
    .delete-confirm { background: #dc2626; color: #fff; }
    .delete-confirm:hover { background: #b91c1c; }
    .delete-cancel-btn { background: transparent; border: 1px solid var(--border) !important; color: var(--text-3); }
    .delete-cancel-btn:hover { color: var(--text); }

    /* ── Move popover ── */
    .move-popover {
      position: fixed;
      z-index: 400;
      background: var(--surface-2);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius);
      padding: 10px;
      width: 240px;
      max-height: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
      flex-direction: column;
    }
    .move-popover.open { display: flex; }
    .move-popover-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-3);
      margin: 0 2px 8px;
    }
    .move-list { display: flex; flex-direction: column; gap: 1px; overflow-y: auto; }
    .move-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 9px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-2);
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      transition: background 0.1s, color 0.1s;
    }
    .move-option:hover { background: var(--border); color: var(--text); }
    .move-empty { font-size: 12px; color: var(--text-3); padding: 4px 2px; line-height: 1.45; }

    /* ── List view fav indicator ── */
    .list-fav-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ec4899;
      flex-shrink: 0;
      margin-right: -6px;
    }

    /* ── Favorites filter ── */
    .fav-filter-btn {
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-3);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .fav-filter-btn:hover { border-color: var(--border-hover); color: var(--text-2); }
    .fav-filter-btn.active { background: rgba(236,72,153,0.12); border-color: #ec4899; color: #ec4899; }
    .fav-filter-btn svg { width: 11px; height: 11px; }
    .fav-filter-btn.active svg { fill: #ec4899; }
    .fav-filter-btn svg path { stroke: currentColor; stroke-width: 1.8; }

    /* ── Clear filters ── */
    .clear-filters-btn {
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-3);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      display: none;
      align-items: center;
      gap: 4px;
    }
    .clear-filters-btn.visible { display: inline-flex; }
    .clear-filters-btn:hover { color: var(--text); border-color: var(--border-hover); }

    /* ── Collection switcher ── */
    .collection-switcher { display: flex; gap: 4px; flex-shrink: 0; }
    .coll-btn {
      padding: 4px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .coll-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-hover); }
    .coll-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }
    /* Square icon buttons (edit ⚙ / new +) — equal padding, centered glyph, same height. */
    .coll-btn.coll-edit, .coll-btn.coll-new {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      padding: 4px 0;
      font-size: 14px;
      line-height: 1;
    }
    .coll-btn.coll-new { font-size: 17px; }

    /* Board field editor — each field is its own grouped container with breathing room. */
    .board-field-edit {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 12px;
    }
    .board-field-edit:hover { border-color: var(--border-hover); }
    .board-field-edit .bf-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr 0.9fr auto auto;
      gap: 8px;
      align-items: center;
    }
    .bf-key-input { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    .bf-remove { padding: 6px 9px; align-self: stretch; }
    /* AI toggle pill — accent when on, muted when off. */
    .bf-ai {
      padding: 6px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-3);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .bf-ai:hover { border-color: var(--border-hover); color: var(--text-2); }
    .bf-ai[data-on="true"] { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* ── Main Layout ── */
    main {
      padding: 24px 20px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }

    .tag-chip {
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-3);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tag-chip:hover { border-color: var(--border-hover); color: var(--text-2); }
    .tag-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-3);
    }
    .empty h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--text-2); }
    .empty code { font-size: 12px; background: var(--surface); padding: 4px 8px; border-radius: 4px; }

    /* ── Empty states (impeccable craft) ─────────────────────────────────
       A board with no items leads with its point of view, not a generic blank.
       A faint, static preview of the board's own layout sits behind the copy
       (potential, not absence) — decorative, masked clear behind the text. */
    .empty-state {
      grid-column: 1 / -1;
      position: relative;
      isolation: isolate;
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .empty-copy { position: relative; z-index: 1; width: 100%; max-width: 46ch; text-align: left; }
    .empty-head {
      margin: 0 0 10px;
      font-size: clamp(22px, 3.2vw, 27px);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.015em;
      color: var(--text);
      text-wrap: balance;
    }
    .empty-body {
      margin: 0;
      max-width: 44ch;
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-2);
      text-wrap: pretty;
    }
    .empty-degraded {
      margin: 16px 0 0;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      max-width: 44ch;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-3);
    }
    .empty-actions { display: flex; align-items: center; gap: 14px; margin-top: 26px; flex-wrap: wrap; }
    .empty-cta {
      display: inline-block;
      font: inherit; font-size: 14px; font-weight: 600;
      color: #0c0c0c; background: var(--accent);
      border: 1px solid var(--accent); border-radius: var(--radius-sm);
      padding: 9px 16px; cursor: pointer; text-decoration: none;
      transition: filter 140ms cubic-bezier(0.22,1,0.36,1), transform 140ms cubic-bezier(0.22,1,0.36,1);
    }
    .empty-cta:hover { filter: brightness(1.08); }
    .empty-cta:active { transform: translateY(1px); }
    .empty-cta--ghost { color: var(--text); background: transparent; border-color: var(--border); }
    .empty-cta--ghost:hover { background: var(--surface); border-color: var(--border-hover); filter: none; }
    .empty-link {
      font: inherit; font-size: 14px; color: var(--text-2);
      background: none; border: none; padding: 4px 2px; cursor: pointer;
      transition: color 140ms ease;
    }
    .empty-link:hover { color: var(--text); }
    .empty-link span { color: var(--accent); }
    .empty-hint { margin: 18px 0 0; max-width: 44ch; font-size: 12.5px; line-height: 1.55; color: var(--text-3); }
    .empty-cta:focus-visible, .empty-cta--ghost:focus-visible, .empty-link:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px;
    }
    .empty-ghost {
      position: absolute; inset: 0; z-index: 0;
      display: grid; gap: 14px; padding: 48px;
      opacity: 0.5; pointer-events: none;
      -webkit-mask-image: radial-gradient(120% 78% at 50% 36%, transparent 0%, transparent 40%, #000 96%);
              mask-image: radial-gradient(120% 78% at 50% 36%, transparent 0%, transparent 40%, #000 96%);
    }
    .empty-ghost span { border: 1px solid var(--border); border-radius: var(--radius); background: linear-gradient(180deg, var(--surface), transparent); }
    .empty-ghost--grid { grid-template-columns: repeat(3, 1fr); grid-auto-rows: 116px; }
    .empty-ghost--list { grid-template-columns: 1fr; grid-auto-rows: 54px; max-width: 760px; margin: 0 auto; }
    @media (max-width: 640px) {
      .empty-state { min-height: 56vh; }
      .empty-ghost--grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (prefers-reduced-motion: reduce) {
      .empty-cta { transition: none; }
    }

    /* ── Welcome / "where to begin" guide (opened from the empty state) ── */
    .modal.modal--welcome { max-width: 600px; }
    .welcome { padding: 36px 40px 30px; }
    .welcome-eyebrow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.11em; color: var(--text-3); margin: 0 0 8px; }
    .welcome-title { margin: 0 0 4px; font-size: 23px; font-weight: 650; line-height: 1.2; letter-spacing: -0.015em; color: var(--text); text-wrap: balance; }
    .welcome-section { margin-top: 26px; padding-top: 24px; border-top: 1px solid var(--border); }
    .welcome-section h3 { margin: 0 0 16px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); }
    .welcome-steps { margin: 0; padding: 0; list-style: none; counter-reset: step; display: flex; flex-direction: column; gap: 14px; }
    .welcome-steps li { position: relative; padding-left: 36px; font-size: 14px; line-height: 1.55; color: var(--text-2); }
    .welcome-steps li b { color: var(--text); font-weight: 600; }
    .welcome-steps li::before {
      counter-increment: step; content: counter(step);
      position: absolute; left: 0; top: -1px;
      width: 24px; height: 24px; border-radius: 50%;
      display: grid; place-items: center;
      font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums;
      color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(245,158,11,0.3);
    }
    .welcome-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 28px; }
    .welcome-grid > div { display: flex; flex-direction: column; gap: 3px; }
    .welcome-grid b { font-size: 13.5px; font-weight: 600; color: var(--text); }
    .welcome-grid span { font-size: 12.5px; line-height: 1.5; color: var(--text-3); }
    .welcome-letter p { margin: 0 0 13px; font-size: 14.5px; line-height: 1.7; color: var(--text-2); text-wrap: pretty; }
    .welcome-letter p:last-child { margin-bottom: 0; }
    .welcome-sign { color: var(--text-3); font-style: italic; }
    .welcome-footer { display: flex; align-items: center; gap: 16px; margin-top: 30px; }
    @media (max-width: 560px) {
      .welcome { padding: 28px 22px 24px; }
      .welcome-grid { grid-template-columns: 1fr; gap: 16px; }
    }

    /* ── Grid View ── */
    #grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .grid-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    .grid-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* Cursor-tracked edge glow on real cards (overdrive, quiet): a neutral
       highlight rides the border where the cursor is — a gradient outline, no
       surface wash, no color. JS sets --mx/--my on the hovered card; the masked
       ::after paints only the 1px ring. */
    .grid-card, .list-card, .lib-card { position: relative; }
    .grid-card::after, .list-card::after, .lib-card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: radial-gradient(150px circle at var(--mx, -300px) var(--my, -300px),
                  rgba(240, 240, 243, 0.22), rgba(240, 240, 243, 0) 60%);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
              mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    .grid-card:hover::after, .list-card:hover::after, .lib-card:hover::after { opacity: 1; }

    .card-screenshot {
      width: 100%;
      height: 200px;
      object-fit: cover;
      object-position: top;
      display: block;
      background: var(--surface-2);
    }

    .card-no-screenshot {
      width: 100%;
      height: 200px;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      font-size: 12px;
    }

    /* Library/text-board grid tile: no screenshot, scales to text fields. */
    .lib-grid-card { position: relative; }
    .lib-grid-card .more-btn-list { position: absolute; top: 10px; right: 10px; }
    .lib-grid-card .card-body { display: flex; flex-direction: column; gap: 8px; padding: 14px 16px; }
    .lib-grid-card .card-header { margin-bottom: 0; padding-right: 32px; }
    .lib-grid-host { font-size: 11px; color: var(--text-3); }
    .lib-grid-summary {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-2);
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-body {
      padding: 12px 14px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .tier-badge {
      flex-shrink: 0;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .tier-badge.structural { background: rgba(124,58,237,0.2); color: var(--structural); }
    .tier-badge.polish { background: rgba(5,150,105,0.2); color: var(--polish); }
    .tier-badge.reference { background: rgba(14,165,233,0.2); color: var(--reference); }

    .card-steal {
      font-size: 12px;
      color: var(--text-2);
      font-style: italic;
      margin-bottom: 10px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--surface-2);
      color: var(--text-3);
      border: 1px solid var(--border);
    }

    /* ── List View ── */
    #list-view { display: none; }

    .list-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 14px;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 6px;
    }
    .list-card:hover { border-color: var(--border-hover); background: var(--surface-2); }

    .list-thumb {
      width: 72px;
      height: 48px;
      object-fit: cover;
      object-position: top;
      border-radius: 5px;
      background: var(--surface-2);
      flex-shrink: 0;
    }

    .list-thumb-empty {
      width: 72px;
      height: 48px;
      border-radius: 5px;
      background: var(--surface-2);
      flex-shrink: 0;
    }

    .list-meta {
      display: grid;
      grid-template-columns: 180px 1fr 80px;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .list-name { font-size: 13px; font-weight: 600; }
    .list-url { font-size: 11px; color: var(--text-3); }

    .list-steal {
      font-size: 12px;
      color: var(--text-2);
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-category { font-size: 11px; color: var(--text-3); }

    .list-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      justify-content: flex-end;
    }

    /* ── Library List ── */
    /* Mobile-first: stacked headline → summary → topics.
       Desktop (>=720px): two-column top row (headline left, topics right), summary full-width below. */
    .lib-card {
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-areas:
        "headline"
        "summary"
        "topics";
      row-gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .lib-card:hover { border-color: var(--border-hover); background: var(--surface-2); }

    .lib-card .more-btn-list { position: absolute; top: 12px; right: 12px; }

    .lib-headline { grid-area: headline; min-width: 0; padding-right: 40px; }
    .lib-summary  { grid-area: summary; }
    .lib-topics   { grid-area: topics; }

    .lib-title {
      display: inline-block;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
      text-decoration: none;
      transition: color 0.15s;
    }
    .lib-title:hover { color: var(--accent); }

    .lib-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
      font-size: 11px;
      color: var(--text-3);
    }
    .lib-meta > * + *::before {
      content: "·";
      margin-right: 8px;
      color: var(--text-3);
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      display: inline-block;
    }
    .lib-type {
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      font-size: 10px;
      color: var(--text-2);
    }

    .lib-summary {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-2);
      max-width: 72ch;
    }

    .lib-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    @media (min-width: 720px) {
      .lib-card {
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-areas:
          "headline topics"
          "summary  summary";
        column-gap: 24px;
      }
      .lib-headline { padding-right: 0; }
      .lib-summary { max-width: none; }
      .lib-topics {
        justify-content: flex-end;
        align-content: flex-start;
        max-width: 42ch;
        padding-right: 32px;
      }
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 20px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }

    .llm-code {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin: 6px 0 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 820px;
      overflow: hidden;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-2);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      z-index: 10;
      transition: all 0.15s;
    }
    .modal-close:hover { background: var(--border); color: var(--text); }

    .modal-screenshot {
      width: 100%;
      height: 320px;
      object-fit: cover;
      object-position: top;
      display: block;
    }

    .modal-screenshot-empty {
      width: 100%;
      height: 200px;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
    }

    .modal-body { padding: 24px; }

    .modal-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }

    .modal-title { font-size: 20px; font-weight: 700; }

    .modal-url { font-size: 12px; color: var(--text-3); margin-bottom: 12px; }
    .modal-url a { color: var(--accent); text-decoration: none; }
    .modal-url a:hover { text-decoration: underline; }

    .modal-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-3);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .modal-tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .modal-tab {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 8px 12px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-3);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }
    .modal-tab:hover { color: var(--text-2); }
    .modal-tab.active { color: var(--text); border-bottom-color: var(--accent); }

    .modal-panel { display: none; }
    .modal-panel.active { display: block; }

    .design-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .design-field { }

    .field-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-3);
      margin-bottom: 3px;
    }

    .field-value { font-size: 13px; color: var(--text-2); line-height: 1.45; }

    .steal-this {
      background: var(--accent-dim);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 24px;
    }
    .steal-this .field-label { color: var(--accent); margin-bottom: 4px; }
    .steal-this .field-value { color: var(--text); font-style: italic; font-size: 14px; }

    .reflection-grid {
      display: grid;
      gap: 12px;
    }

    .reflection-field .field-label { margin-bottom: 4px; }

    /* One field style across text inputs, selects, and textareas (board editor,
       composer, item-modal editing) so every form control matches. */
    .reflection-input {
      width: 100%;
      box-sizing: border-box;
      background-color: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea.reflection-input { resize: vertical; min-height: 60px; }
    select.reflection-input {
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      padding-right: 28px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6' fill='none'><path d='M1 1l4 4 4-4' stroke='%23888' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 10px center;
    }
    .reflection-input:hover { border-color: var(--border-hover); }
    .reflection-input:focus { border-color: var(--accent); }
    .reflection-input::placeholder { color: var(--text-3); }
    .reflection-input[readonly] { color: var(--text-2); cursor: default; }
    .reflection-input[readonly]:hover { border-color: var(--border); }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .btn {
      padding: 7px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-2);
    }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { background: #fbbf24; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }

    .save-status {
      font-size: 12px;
      color: var(--polish);
      align-self: center;
      margin-right: auto;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .save-status.visible { opacity: 1; }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="header-row-left">
      <div class="logo">Board<span>.</span></div>
      <input class="search" type="search" placeholder="Search sites, tags, ideas..." id="search" />
    </div>
    <div class="add-bar">
      <span class="add-status" id="add-status"></span>
      <input class="add-input" id="add-input" type="url" placeholder="Paste a URL to add..." />
      <div class="add-action" id="add-action">
        <div class="add-button-group">
          <!-- Label + menu are populated at runtime from /api/meta (renderAgentMenu). -->
          <button class="add-btn" id="add-btn">Add</button>
          <button class="agent-menu-btn" id="agent-menu-btn" type="button" aria-label="AI provider options" aria-haspopup="menu" aria-expanded="false">
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4 6h8l-4 5-4-5z"/></svg>
          </button>
        </div>
        <div class="agent-menu" id="agent-menu" role="menu">
          <button class="agent-option add-llm-option" type="button" role="menuitem">+ Add LLM</button>
        </div>
      </div>
    </div>
  </div>
  <div class="header-row">
    <div class="filters">
      <select class="filter-select" id="audience-filter"><option value="">Audience</option></select>
      <select class="filter-select" id="form-filter"><option value="">Form</option></select>
      <select class="filter-select" id="domain-filter"><option value="">Domain</option></select>
      <div class="tier-filters">
        <button class="tier-btn" data-tier="structural">Structural</button>
        <button class="tier-btn" data-tier="polish">Polish</button>
        <button class="tier-btn" data-tier="reference">Reference</button>
      </div>
      <button class="fav-filter-btn" id="fav-filter-btn">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 13.5S2 9.5 2 5.5A3 3 0 0 1 8 4a3 3 0 0 1 6 1.5C14 9.5 8 13.5 8 13.5Z"/></svg>
        Favorites
      </button>
      <select class="filter-select" id="library-type-filter" style="display:none">
        <option value="">Type</option>
        <option value="article">Article</option>
        <option value="doc">Doc</option>
        <option value="paper">Paper</option>
        <option value="repo">Repo</option>
        <option value="video">Video</option>
      </select>
      <button class="clear-filters-btn" id="clear-filters-btn">× Clear</button>
    </div>
    <div class="header-right">
      <span class="count" id="count"></span>
      <select class="filter-select" id="sort-select">
        <option value="newest">Recently added</option>
        <option value="oldest">Oldest first</option>
      </select>
      <div class="view-toggle">
        <button class="view-btn active" id="btn-grid" title="Grid view">
          <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        </button>
        <button class="view-btn" id="btn-list" title="List view">
          <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="2.5" rx="1"/><rect x="1" y="6.75" width="14" height="2.5" rx="1"/><rect x="1" y="11.5" width="14" height="2.5" rx="1"/></svg>
        </button>
      </div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">
        <svg class="sun-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
        <svg class="moon-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 9.5A5.5 5.5 0 0 1 6 4a5.5 5.5 0 0 1 .5-2.3A6 6 0 1 0 14 9a5.5 5.5 0 0 1-2.5.5z"/></svg>
      </button>
    </div>
  </div>
</header>

<main>
  <div class="tag-cloud" id="tag-cloud"></div>
  <div class="tag-cloud" id="library-topic-cloud" style="display:none"></div>
  <div id="grid-view"></div>
  <div id="list-view"></div>
</main>

<div class="ctx-menu" id="ctx-menu">
  <button class="ctx-item" id="ctx-refetch">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 8A5 5 0 1 1 8 3"/><path d="M13 3v3h-3"/></svg>
    Refetch
  </button>
  <button class="ctx-item" id="ctx-move">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4.5h4.5L8 6h6v6.5H2z"/><path d="M6.5 9h4M9 7.2 11.3 9 9 10.8"/></svg>
    Move to board
  </button>
  <button class="ctx-item" id="ctx-replace-screenshot">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="1"/><circle cx="6" cy="7" r="1.3"/><path d="m3 12 3.5-3.5L9 11l3-3 1 1"/></svg>
    Replace screenshot
  </button>
  <button class="ctx-item danger" id="ctx-delete">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h10M6 4V2.5h4V4M5.5 4l.5 9h4l.5-9"/></svg>
    Delete
  </button>
</div>

<input type="file" id="screenshot-file-input" accept="image/png,image/jpeg,image/webp" style="display:none" />

<div class="refetch-popover" id="refetch-popover">
  <div class="refetch-popover-label">Custom instructions (optional)</div>
  <textarea id="refetch-instructions" placeholder="e.g. Focus on animations and scroll interactions, look closer at the pricing page..."></textarea>
  <div class="refetch-footer">
    <button class="refetch-x" id="refetch-cancel">Cancel</button>
    <button class="refetch-go" id="refetch-go">Refetch</button>
  </div>
</div>

<div class="delete-popover" id="delete-popover">
  <p>Delete <strong id="delete-title"></strong>? This can't be undone.</p>
  <div class="delete-footer">
    <button class="delete-cancel-btn" id="delete-cancel">Cancel</button>
    <button class="delete-confirm" id="delete-confirm">Delete</button>
  </div>
</div>

<div class="move-popover" id="move-popover">
  <div class="move-popover-label">Move to board</div>
  <div class="move-list" id="move-list"></div>
</div>

<div class="fav-popover" id="fav-popover">
  <div class="fav-popover-label">♥ Why this one?</div>
  <textarea id="fav-reason" placeholder="Optional — what makes this a favorite?"></textarea>
  <div class="fav-popover-footer">
    <button class="fav-cancel" id="fav-cancel">Cancel</button>
    <button class="fav-save" id="fav-save">Save</button>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
  let bookmarks = [];
  let filtered = [];
  let activeView = 'grid';
  let activeTiers = new Set();
  let activeTag = null;
  let showFavoritesOnly = false;
  let currentBookmark = null;
  let analysisAgent = 'claude';
  // null = unknown until /api/meta resolves; then boolean. Drives the add button label
  // ("Add" vs "Add with <provider>") and the caret menu ("+ Add LLM").
  let providerConfigured = null;
  // The configured provider's human label from /api/meta (e.g. "Claude Code"), or null.
  let providerLabel = null;
  let collections = [];
  let activeCollection = 'inspiration';
  let libraryTopicFilter = '';
  let libraryTypeFilter = '';
  let currentLibraryItem = null;

  const TIER_LABELS = { structural: 'Structural', polish: 'Polish', reference: 'Reference' };
  const ANALYSIS_AGENT_LABELS = { claude: 'Claude Code', codex: 'Codex' };
  const DESIGN_FIELDS = [
    ['above_fold', 'Above the Fold'],
    ['nav_pattern', 'Navigation'],
    ['scroll_behavior', 'Scroll Behavior'],
    ['whitespace', 'Whitespace'],
    ['typography_hierarchy', 'Typography'],
    ['color_story', 'Color Story'],
    ['social_proof', 'Social Proof'],
    ['cta_strategy', 'CTA Strategy'],
    ['design_system_score', 'Design System'],
  ];

  let taxonomy = { audience: [], form: [], domain: [] };

  function updateAnalysisAgentControls() {
    const configured = providerConfigured === true;
    document.getElementById('add-btn').textContent = configured
      ? `Add with ${providerLabel || 'AI'}`
      : 'Add';
    renderAgentMenu(configured);
  }

  // The caret menu reflects the ACTUAL server config: when AI is wired up it names the
  // configured provider (only that one — no phantom agents) and always offers a
  // "+ Add LLM" entry (→ setup directions). innerHTML is rebuilt each call, so the
  // "+ Add LLM" listener is (re)attached here and never left stale.
  function renderAgentMenu(configured) {
    const menu = document.getElementById('agent-menu');
    const header = (configured && providerLabel)
      ? `<div class="agent-menu-header">Using ${esc(providerLabel)}</div>`
      : '';
    menu.innerHTML = header + '<button class="agent-option add-llm-option" type="button" role="menuitem">+ Add LLM</button>';
    menu.querySelector('.add-llm-option').addEventListener('click', e => {
      e.stopPropagation();
      closeAgentMenu();
      openAddLlmModal();
    });
  }

  function setAnalysisAgent(agent) {
    if (!ANALYSIS_AGENT_LABELS[agent]) return;
    analysisAgent = agent;
    localStorage.setItem('board.analysisAgent', analysisAgent);
    updateAnalysisAgentControls();
  }

  function openAgentMenu() {
    document.getElementById('agent-menu').classList.add('open');
    document.getElementById('agent-menu-btn').setAttribute('aria-expanded', 'true');
  }

  function closeAgentMenu() {
    document.getElementById('agent-menu').classList.remove('open');
    document.getElementById('agent-menu-btn').setAttribute('aria-expanded', 'false');
  }

  function initAnalysisAgentControl() {
    const stored = localStorage.getItem('board.analysisAgent');
    if (ANALYSIS_AGENT_LABELS[stored]) analysisAgent = stored;
    updateAnalysisAgentControls();

    document.getElementById('agent-menu-btn').addEventListener('click', e => {
      e.stopPropagation();
      const menu = document.getElementById('agent-menu');
      if (menu.classList.contains('open')) closeAgentMenu();
      else openAgentMenu();
    });
    // .agent-option listeners are (re)attached by renderAgentMenu, which owns the
    // menu's contents (agent picker vs "+ Add LLM").
  }

  function openAddLlmModal() {
    showModalContent(`
      <div class="modal-body">
        <div class="modal-title-row"><div class="modal-title">Enable AI analysis</div></div>
        <p style="color:var(--text-2);font-size:14px;margin:4px 0 14px">Board works fully without AI. To auto-summarize and tag what you add, wire up a provider and restart the server. There's no in-app setup yet — set an environment variable:</p>
        <div class="field-label">Use your Claude (or Codex) subscription — local CLI</div>
        <pre class="llm-code">LLM_AGENT=claude</pre>
        <div class="field-label" style="margin-top:14px">…or an OpenAI-compatible API</div>
        <pre class="llm-code">LLM_BASE_URL=https://api.openai.com/v1
LLM_MODEL=gpt-4o
LLM_API_KEY=sk-…</pre>
        <p style="color:var(--text-3);font-size:12.5px;margin:14px 0 0">Set it in your <code>.env</code> (or process manager), then restart Board. See <code>.env.example</code> for all options.</p>
        <div class="modal-footer">
          <button class="btn btn-primary" id="add-llm-close">Got it</button>
        </div>
      </div>`);
    document.getElementById('add-llm-close').onclick = closeModal;
  }

  function selectedAnalysisAgent() {
    return analysisAgent;
  }

  async function load() {
    const helpers = window.collectionHelpers;
    const storedCid = localStorage.getItem('board.activeCollection') || 'inspiration';
    // Boards must load before anything else can render. A fetch failure (server down)
    // or zero boards used to throw past renderSwitcher and white-screen the app; instead
    // render a dignified board-level fallback so the chrome (incl. the + affordance) and
    // a way forward always appear (Design Principle 3: degrade with dignity).
    try {
      const collectionsRes = await fetch('/api/collections');
      if (!collectionsRes.ok) throw new Error('collections ' + collectionsRes.status);
      collections = await collectionsRes.json();
    } catch {
      renderSwitcher();
      showBoardsFallback({ unavailable: true });
      return;
    }
    if (!collections.length) {
      renderSwitcher();
      showBoardsFallback({ unavailable: false });
      return;
    }
    // Boards loaded → restore the toolbar row the fallback hides, then render normally.
    const toolbar = document.querySelector('.filters')?.closest('.header-row');
    if (toolbar) toolbar.style.display = '';
    activeCollection = helpers.resolveActiveCollection(storedCid, collections);
    const activeCol = collections.find(c => c.id === activeCollection);

    const fetches = [fetch(helpers.itemsUrl(activeCollection))];
    if (activeCol?.type === 'inspiration') fetches.push(fetch('/api/taxonomy'));
    const results = await Promise.all(fetches);
    bookmarks = await results[0].json();
    if (activeCol?.type === 'inspiration') taxonomy = await results[1].json();

    renderSwitcher();
    if (activeCol?.type === 'inspiration') { buildFacetFilters(); buildTagCloud(); }
    applyCollectionChrome(activeCol);
    applyFilters();
    subscribeToStatus();
    // Provider state is boot config (can't change at runtime), so fetch it once — not
    // on every SSE-driven reload, which would churn the add controls mid-interaction.
    if (providerConfigured === null) {
      const meta = await fetch('/api/meta').then(r => r.json()).catch(() => ({}));
      providerConfigured = !!meta.providerConfigured;
      providerLabel = meta.provider?.label || null;
      updateAnalysisAgentControls();
      // The empty state's copy is AI-aware (graceful degradation). The first render
      // above ran before meta resolved (providerConfigured was null → AI-off copy);
      // if the board is empty, re-render now so it reflects the real provider state.
      if (!bookmarks.length) applyFilters();
    }
    maybeShowAiNudge();
  }

  // Render a whole-board fallback (server unreachable, or zero boards) into the main
  // area: hide the filter toolbar + clouds, take over grid-view, and wire the variant's
  // affordance — Retry re-runs load(), "Describe a board" opens the existing composer
  // (progressive disclosure: the empty state is the invite, the modal is the detail).
  function showBoardsFallback(opts) {
    // Hide the whole filter/sort/view toolbar row (board-scoped + inert here); the
    // header-row-left (title, switcher, search, add) stays so the chrome is intact.
    const toolbar = document.querySelector('.filters')?.closest('.header-row');
    if (toolbar) toolbar.style.display = 'none';
    const tagCloud = document.getElementById('tag-cloud');
    const libCloud = document.getElementById('library-topic-cloud');
    if (tagCloud) tagCloud.style.display = 'none';
    if (libCloud) libCloud.style.display = 'none';
    const listView = document.getElementById('list-view');
    const gridView = document.getElementById('grid-view');
    listView.innerHTML = ''; listView.style.display = 'none';
    gridView.style.display = '';
    gridView.innerHTML = window.collectionHelpers.renderBoardsFallback(opts);
    const retry = gridView.querySelector('[data-boards-retry]');
    if (retry) retry.addEventListener('click', () => load());
    const create = gridView.querySelector('[data-boards-new]');
    if (create) create.addEventListener('click', openComposeModal);
  }

  // Story 8.6: a peripheral, dismissible "enable AI" nudge — only when no provider is
  // configured (the Story 4.4 signal via /api/meta) AND not previously dismissed. The
  // board stays the hero (SM-C2): a small corner card, never a blocking modal/banner.
  async function maybeShowAiNudge() {
    if (document.getElementById('ai-nudge')) return;
    try {
      const dismissed = localStorage.getItem('board.aiNudgeDismissed') === '1';
      if (!window.collectionHelpers.shouldShowEnableAiNudge({ providerConfigured: !!providerConfigured, dismissed })) return;
      const el = document.createElement('div');
      el.id = 'ai-nudge';
      el.style.cssText = 'position:fixed;bottom:16px;right:16px;max-width:300px;background:var(--surface,#16181d);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.5;color:var(--text-2);box-shadow:0 6px 20px rgba(0,0,0,0.35);z-index:40';
      el.innerHTML = `<div style="margin-bottom:8px">Add an API key or coding-agent to enable AI analysis. Board works fully without it.</div><button id="ai-nudge-dismiss" style="font-size:12px;color:var(--accent,#f59e0b);background:none;border:none;padding:0;cursor:pointer">Dismiss</button>`;
      document.body.appendChild(el);
      document.getElementById('ai-nudge-dismiss').addEventListener('click', () => {
        localStorage.setItem('board.aiNudgeDismissed', '1');
        el.remove();
      });
    } catch { /* nudge is best-effort */ }
  }

  // Story 5.3: live status via SSE. On a transition, refetch the active board
  // (Story 8.4 makes this granular). EventSource auto-reconnects; if unsupported,
  // the same load() is the poll fallback. Re-subscribe only when the board changes.
  let statusSource = null;
  let subscribedCid = null;
  let statusReloadPending = false;
  function subscribeToStatus() {
    if (typeof EventSource === 'undefined') return;
    if (statusSource && subscribedCid === activeCollection) return;
    try {
      if (statusSource) statusSource.close();
      subscribedCid = activeCollection;
      statusSource = new EventSource(window.collectionHelpers.eventsUrl(activeCollection));
      statusSource.addEventListener('status', () => {
        if (statusReloadPending) return;
        statusReloadPending = true;
        setTimeout(() => { statusReloadPending = false; load(); }, 200);
      });
      statusSource.onerror = () => { /* auto-reconnects; load() remains the fallback */ };
    } catch { /* SSE unavailable — poll fallback (manual load) remains */ }
  }

  function renderSwitcher() {
    let sw = document.getElementById('collection-switcher');
    if (!sw) {
      sw = document.createElement('div');
      sw.id = 'collection-switcher';
      sw.className = 'collection-switcher';
      const headerLeft = document.querySelector('.header-row-left');
      headerLeft.insertBefore(sw, document.getElementById('search'));
    }
    // Edit (⚙) only makes sense with an active board; the New-board (+) affordance is
    // ALWAYS present so a board can be created even from the empty/degraded states.
    const hasActive = !!collections.find(c => c.id === activeCollection);
    sw.innerHTML = collections.map(c =>
      `<button class="coll-btn${activeCollection === c.id ? ' active' : ''}" data-cid="${esc(c.id)}">${esc(c.name)}</button>`
    ).join('')
      + (hasActive ? `<button class="coll-btn coll-edit" id="edit-board-btn" title="Edit this board">⚙</button>` : '')
      + `<button class="coll-btn coll-new" id="new-board-btn" title="New board">+</button>`;
    sw.querySelectorAll('.coll-btn[data-cid]').forEach(b =>
      b.addEventListener('click', () => setActiveCollection(b.dataset.cid))
    );
    document.getElementById('new-board-btn').addEventListener('click', openComposeModal);
    const editBtn = document.getElementById('edit-board-btn');
    if (editBtn) editBtn.addEventListener('click', () => openEditBoardModal(activeCollection));
  }

  // --- Story 10.1/10.3 + Edit: New board (compose→preview→create) & Edit board (rename/delete) ---

  function slugifyBoardId(name) {
    const base = String(name).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 32) || 'board';
    return `${base}-${Date.now().toString(36).slice(-4)}`;
  }

  function showModalContent(html) {
    modalLastFocused = document.activeElement;
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function fieldsPreviewHtml(descriptor) {
    const fields = (descriptor && descriptor.fields) || [];
    return fields.map(f =>
      `<div class="board-field-row"><span class="field-badge badge">${esc(f.type)}</span> <strong>${esc(f.label)}</strong> <span style="color:var(--text-3)">${esc(f.key)}</span>${f.enrichable === false ? ' <span style="color:var(--text-3)">(yours)</span>' : ''}</div>`
    ).join('') || '<div style="color:var(--text-3)">No fields</div>';
  }

  function openComposeModal() {
    showModalContent(`
      <div class="modal-body">
        <div class="modal-title-row"><div class="modal-title">New board</div></div>
        <p style="color:var(--text-2);font-size:14px;margin:4px 0 12px">Describe what you collect — you'll get an opinionated board to accept or refine.</p>
        <textarea id="compose-desc" class="reflection-input" rows="3" placeholder="e.g. wines I've tasted, with region, grape, and my notes"></textarea>
        <div class="modal-footer">
          <span class="save-status" id="compose-status"></span>
          <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="compose-go">Compose</button>
        </div>
        <div id="compose-preview"></div>
      </div>`);
    document.getElementById('modal-cancel').onclick = closeModal;
    document.getElementById('compose-go').onclick = runCompose;
  }

  let composedProposal = null;
  async function runCompose() {
    const desc = document.getElementById('compose-desc').value.trim();
    const status = document.getElementById('compose-status');
    const goBtn = document.getElementById('compose-go');
    if (!desc) { status.textContent = 'Describe the board first'; return; }
    goBtn.disabled = true; status.textContent = 'Composing…';
    try {
      const res = await fetch('/skills/compose-board', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: desc }),
      });
      const data = await res.json();
      if (!res.ok) { status.textContent = data.error || 'Compose failed'; return; }
      composedProposal = data; // { status, name, descriptor }
      status.textContent = data.status === 'draft' ? 'Draft (review/edit below)' : 'Proposed';
      document.getElementById('compose-preview').innerHTML = `
        <div class="steal-this" style="margin-top:16px">
          <div class="field-label">Board name</div>
          <input id="compose-name" class="reflection-input" value="${esc(data.name || '')}">
          <div class="field-label" style="margin-top:12px">Fields (${(data.descriptor && data.descriptor.fields || []).length}) · ${esc(data.descriptor && data.descriptor.view || '')} view</div>
          ${fieldsPreviewHtml(data.descriptor)}
        </div>
        <div class="modal-footer"><button class="btn btn-primary" id="compose-create">Create board</button></div>`;
      document.getElementById('compose-create').onclick = createComposedBoard;
    } catch { status.textContent = 'Network error'; }
    finally { goBtn.disabled = false; }
  }

  async function createComposedBoard() {
    if (!composedProposal) return;
    const name = (document.getElementById('compose-name').value || composedProposal.name || '').trim();
    const status = document.getElementById('compose-status');
    const btn = document.getElementById('compose-create');
    if (!name) { status.textContent = 'Name is required'; return; }
    btn.disabled = true; status.textContent = 'Creating…';
    try {
      const id = slugifyBoardId(name);
      const res = await fetch('/skills/create-board', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, name, descriptor: composedProposal.descriptor }),
      });
      const data = await res.json();
      if (!res.ok) { status.textContent = data.error || 'Create failed'; btn.disabled = false; return; }
      closeModal();
      await load();
      await setActiveCollection(id);
    } catch { status.textContent = 'Network error'; btn.disabled = false; }
  }

  const BOARD_FIELD_TYPES = ['text', 'number', 'date', 'url', 'enum', 'tags', 'image'];

  // One editable field row. Existing fields keep their key (read-only — changing it
  // would orphan stored item.fields data); new fields get an editable key.
  function boardFieldRowHtml(field, isExisting) {
    const f = field || { key: '', label: '', type: 'text', enrichable: true, description: '', values: [] };
    const typeOpts = BOARD_FIELD_TYPES.map(t => `<option value="${t}"${f.type === t ? ' selected' : ''}>${t}</option>`).join('');
    return `<div class="board-field-edit">
      <div class="bf-grid">
        <input class="bf-label reflection-input" value="${esc(f.label || '')}" placeholder="Label">
        <input class="bf-key reflection-input bf-key-input" value="${esc(f.key || '')}" placeholder="key" ${isExisting ? 'readonly title="key is fixed for existing fields"' : ''}>

  function wireBoardFieldRow(row) {
    row.querySelector('.bf-remove').onclick = () => row.remove();

      row.querySelector('.bf-values').style.display = typeSel.value === 'enum' ? '' : 'none';
    };

    ai.onclick = () => { ai.dataset.on = ai.dataset.on === 'true' ? 'false' : 'true'; };

        <div class="modal-footer">

        </div>

        <div style="margin-top:20px;border-top:1px solid rgba(255,255,255,0.08);padding-top:14px">

          <p style="color:var(--text-3);font-size:13px;margin:6px 0 10px">Re-analyze every item with the current fields. Your own (non-AI) fields and notes are kept.</p>

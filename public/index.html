  function collectBoardDescriptor() {
    const fields = [...document.querySelectorAll('#board-fields-container .board-field-edit')].map(row => {
      const label = row.querySelector('.bf-label').value.trim();
      let key = row.querySelector('.bf-key').value.trim();
      if (!key && label) key = label.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '').slice(0, 40);
      const type = row.querySelector('.bf-type').value;
      const f = { key, label, type, enrichable: row.querySelector('.bf-ai').dataset.on === 'true' };
      const desc = row.querySelector('.bf-desc').value.trim();
      if (desc) f.description = desc;
      if (type === 'enum') f.values = row.querySelector('.bf-values').value.split(',').map(s => s.trim()).filter(Boolean);
      return f;
    }).filter(f => f.key && f.label);
    return {
      fields,
      enrichment_prompt: document.getElementById('edit-board-prompt').value,
      view: document.getElementById('edit-board-view').value,
      ingest_mode: document.getElementById('edit-board-ingest').value,
    };
  }

  async function saveBoardEdits(boardId) {
    const name = document.getElementById('edit-board-name').value.trim();
    const status = document.getElementById('edit-board-status');
    if (!name) { status.textContent = 'Name is required'; return; }
    const descriptor = collectBoardDescriptor();
    status.textContent = 'Saving…';
    try {
      const res = await fetch(`/api/boards/${encodeURIComponent(boardId)}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, descriptor }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { status.textContent = data.error ? `Invalid: ${data.error}` : 'Save failed'; return; }
      closeModal();
      await load();
    } catch { status.textContent = 'Network error'; }
  }

  async function reenrichBoard(boardId) {
    const status = document.getElementById('edit-board-status');
    status.textContent = 'Queuing…';
    try {
      // Save any pending field edits first so the re-run uses the latest descriptor.
      // Guard: if the edits are invalid, do NOT re-run against the stale descriptor.
      const name = document.getElementById('edit-board-name').value.trim();
      const saveRes = await fetch(`/api/boards/${encodeURIComponent(boardId)}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, descriptor: collectBoardDescriptor() }),
      });
      if (!saveRes.ok) {
        const e = await saveRes.json().catch(() => ({}));
        status.textContent = e.error ? `Fix fields first: ${e.error}` : 'Fix field errors first';
        return;
      }
      const res = await fetch(`/api/boards/${encodeURIComponent(boardId)}/reenrich`, { method: 'POST' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { status.textContent = 'Re-run failed'; return; }
      closeModal();
      await load(); // SSE will stream per-item updates as they finish
    } catch { status.textContent = 'Network error'; }
  }

  async function deleteBoard(boardId) {
    try {
      const res = await fetch(`/api/boards/${encodeURIComponent(boardId)}`, { method: 'DELETE' });
      if (!res.ok && res.status !== 204) { document.getElementById('edit-board-status').textContent = 'Delete failed'; return; }
      closeModal();
      localStorage.setItem('board.activeCollection', 'inspiration');
      await load();
    } catch { document.getElementById('edit-board-status').textContent = 'Network error'; }
  }

  async function setActiveCollection(cid) {
    activeCollection = cid;
    localStorage.setItem('board.activeCollection', cid);
    const helpers = window.collectionHelpers;
    const activeCol = collections.find(c => c.id === cid);

    // Clear filter state for both collection types
    document.getElementById('audience-filter').value = '';
    document.getElementById('form-filter').value = '';
    document.getElementById('domain-filter').value = '';
    activeTiers.clear();
    document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
    activeTag = null;
    showFavoritesOnly = false;
    document.getElementById('fav-filter-btn').classList.remove('active');
    libraryTopicFilter = '';
    libraryTypeFilter = '';
    const libTypeEl = document.getElementById('library-type-filter');
    if (libTypeEl) libTypeEl.value = '';

    const itemsRes = await fetch(helpers.itemsUrl(cid));
    bookmarks = await itemsRes.json();

    if (activeCol?.type === 'inspiration') {
      const taxonomyRes = await fetch('/api/taxonomy');
      taxonomy = await taxonomyRes.json();
      buildFacetFilters();
      buildTagCloud();
    }
    renderSwitcher();
    applyCollectionChrome(activeCol);
    applyFilters();
  }

  function applyCollectionChrome(col) {
    if (!window.collectionHelpers || !col) return;
    const chrome = window.collectionHelpers.collectionChrome(col);

    ['audience-filter', 'form-filter', 'domain-filter'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = chrome.facets ? '' : 'none';
    });
    const tierDiv = document.querySelector('.tier-filters');
    if (tierDiv) tierDiv.style.display = chrome.tiers ? '' : 'none';
    const favBtn = document.getElementById('fav-filter-btn');
    if (favBtn) favBtn.style.display = chrome.facets ? '' : 'none';
    const tagCloud = document.getElementById('tag-cloud');
    if (tagCloud) tagCloud.style.display = chrome.tagCloud ? '' : 'none';

    // Library-specific controls
    const isLibrary = col.type === 'library';
    const libTypeFilter = document.getElementById('library-type-filter');
    if (libTypeFilter) libTypeFilter.style.display = isLibrary ? '' : 'none';
    const libTopicCloud = document.getElementById('library-topic-cloud');
    if (libTopicCloud) libTopicCloud.style.display = isLibrary ? '' : 'none';
    if (isLibrary) renderLibraryTopicCloud();

    // Apply collection's default view
    const newView = col.view || 'grid';
    if (newView !== activeView) {
      activeView = newView;
      const gridView = document.getElementById('grid-view');
      const listView = document.getElementById('list-view');
      if (activeView === 'list') {
        gridView.style.display = 'none';
        listView.style.display = 'block';
        document.getElementById('btn-grid').classList.remove('active');
        document.getElementById('btn-list').classList.add('active');
      } else {
        gridView.style.display = '';
        listView.style.display = 'none';
        document.getElementById('btn-grid').classList.add('active');
        document.getElementById('btn-list').classList.remove('active');
      }
    }
  }

  function buildFacetFilters() {
    const facets = [
      ['audience-filter', 'Audience', taxonomy.audience],
      ['form-filter',     'Form',     taxonomy.form],
      ['domain-filter',   'Domain',   taxonomy.domain],
    ];
    facets.forEach(([id, label, values]) => {
      const sel = document.getElementById(id);
      sel.innerHTML = `<option value="">${label}</option>`;
      values.forEach(v => {
        const o = document.createElement('option');
        o.value = v; o.textContent = v;
        sel.appendChild(o);
      });
    });
  }

  function buildTagCloud() {
    const counts = {};
    bookmarks.forEach(b => b.meta?.tags?.forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 30);
    const cloud = document.getElementById('tag-cloud');
    cloud.innerHTML = '';
    sorted.forEach(([tag]) => {
      const chip = document.createElement('button');
      chip.className = 'tag-chip' + (activeTag === tag ? ' active' : '');
      chip.textContent = tag;
      chip.onclick = () => { activeTag = activeTag === tag ? null : tag; buildTagCloud(); applyFilters(); };
      cloud.appendChild(chip);
    });
    if (!sorted.length) cloud.style.display = 'none';
    else cloud.style.display = '';
  }

  function applyFilters() {
    const searchEl = document.getElementById('search');
    const audienceEl = document.getElementById('audience-filter');
    const formEl = document.getElementById('form-filter');
    const domainEl = document.getElementById('domain-filter');
    const q = searchEl.value.toLowerCase();
    const audience = audienceEl.value;
    const form = formEl.value;
    const domain = domainEl.value;

    audienceEl.classList.toggle('active', !!audience);
    formEl.classList.toggle('active', !!form);
    domainEl.classList.toggle('active', !!domain);

    const anyActive = !!(q || audience || form || domain || activeTiers.size || showFavoritesOnly || activeTag || libraryTopicFilter || libraryTypeFilter);
    document.getElementById('clear-filters-btn').classList.toggle('visible', anyActive);

    if (activeCollection !== 'inspiration') {
      filtered = bookmarks.filter(b =>
        window.collectionHelpers.matchesLibraryFilters(b, { q, topic: libraryTopicFilter, type: libraryTypeFilter })
      );
    } else {
      filtered = bookmarks.filter(b => {
        if (showFavoritesOnly && !b.favorite) return false;
        if (audience && b.meta?.audience !== audience) return false;
        if (form && b.meta?.form !== form) return false;
        if (domain && b.meta?.domain !== domain) return false;
        if (activeTiers.size && !activeTiers.has(b.meta?.tier)) return false;
        if (activeTag && !b.meta?.tags?.includes(activeTag)) return false;
        if (q) {
          const hay = [
            b.title, b.url,
            b.meta?.audience, b.meta?.form, b.meta?.domain,
            b.design?.steal_this,
            b.summary,
            ...(b.topics || []),
            ...(b.meta?.tags || []),
          ].filter(Boolean).join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
    }

    const sort = document.getElementById('sort-select').value;
    const order = new Map(bookmarks.map((b, i) => [b.id, i]));
    filtered.sort((a, b) => {
      const cmp = String(a.added).localeCompare(String(b.added));
      if (cmp !== 0) return sort === 'oldest' ? cmp : -cmp;
      const ai = order.get(a.id), bi = order.get(b.id);
      return sort === 'oldest' ? ai - bi : bi - ai;
    });

    const noun = activeCollection === 'inspiration' ? 'site' : 'item';
    document.getElementById('count').textContent = `${filtered.length} ${noun}${filtered.length !== 1 ? 's' : ''}`;
    render();
  }

  function render() {
    const activeCol = collections.find(c => c.id === activeCollection);
    if (activeCol && activeCol.type !== 'inspiration') {
      // Non-visual boards (e.g. Library) honor the grid/list toggle too — the grid is
      // just screenshot-less (the board's descriptor stores no images).
      if (activeView === 'grid') renderLibraryGrid();
      else renderLibraryList();
      return;
    }
    if (activeView === 'grid') renderGrid();
    else renderList();
  }

  const HEART_SVG = `<svg viewBox="0 0 16 16"><path class="heart-outline" d="M8 13.5S2 9.5 2 5.5A3 3 0 0 1 8 4a3 3 0 0 1 6 1.5C14 9.5 8 13.5 8 13.5Z"/></svg>`;

  function renderGrid() {
    const el = document.getElementById('grid-view');

    el.innerHTML = filtered.map(b => `
      <div class="grid-card" data-id="${b.id}" style="position:relative">
        ${b.screenshot
          ? `<img class="card-screenshot" src="${shotSrc(b)}" alt="${esc(b.title)}" loading="lazy" />`
          : `<div class="card-no-screenshot">No image</div>`}
        <button class="fav-btn${b.favorite ? ' active' : ''}" data-id="${b.id}" title="${b.favorite ? 'Unfavorite' : 'Favorite'}">${HEART_SVG}</button>
        <button class="more-btn" data-id="${b.id}" title="More">···</button>
        <div class="card-body">
          <div class="card-header">
            <div class="card-title">${esc(b.title)}</div>
            <span class="tier-badge ${b.meta?.tier}">${TIER_LABELS[b.meta?.tier] || b.meta?.tier || ''}</span>
          </div>
          <div class="card-steal">${esc(b.design?.steal_this || '')}</div>
          <div class="card-tags">
            ${(b.meta?.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
          </div>
        </div>
      </div>
    `).join('');
    el.querySelectorAll('.grid-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (!e.target.closest('.fav-btn')) openModal(card.dataset.id);
      });
    });
    el.querySelectorAll('.fav-btn').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); openFavPopover(btn.dataset.id, btn); });
    });
    el.querySelectorAll('.more-btn').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); openCtxMenu(btn.dataset.id, btn); });
    });
  }

  function renderList() {
    const el = document.getElementById('list-view');
    if (!filtered.length) { el.innerHTML = emptyState(bookmarks.length > 0); return; }
    el.innerHTML = filtered.map(b => `
      <div class="list-card" data-id="${b.id}">
        <div style="display:flex;align-items:center;gap:8px">

          <div>
            <div class="list-name">${esc(b.title)}</div>
            <div class="list-url">${esc(hostname(b.url))}</div>

          </div>
          <div class="list-steal">${esc(b.design?.steal_this || '')}</div>
          <div>
            <span class="tier-badge ${b.meta?.tier}">${TIER_LABELS[b.meta?.tier] || ''}</span>

    el.querySelectorAll('.list-card').forEach(card => {

        if (!e.target.closest('.more-btn-list')) openModal(card.dataset.id);
      });

    el.querySelectorAll('.more-btn-list').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); openCtxMenu(btn.dataset.id, btn); });

  // Grid view for non-visual boards (Library, composed text boards): the same tile
  // shell as the inspiration grid, but with NO screenshot area — the board stores no
  // images. Scales to library fields (type, summary, topics) with graceful fallbacks.
  function renderLibraryGrid() {
    const gridEl = document.getElementById('grid-view');
    const listEl = document.getElementById('list-view');
    listEl.style.display = 'none';
    gridEl.style.display = '';
    if (!filtered.length) { gridEl.innerHTML = emptyState(bookmarks.length > 0); return; }
    gridEl.innerHTML = filtered.map(b => `
      <div class="grid-card lib-grid-card" data-id="${b.id}">
        <button class="more-btn-list" data-id="${b.id}" title="More">···</button>
        <div class="card-body">
          <div class="card-header">
            <div class="card-title">${esc(b.title || b.url)}</div>
            ${b.type ? `<span class="lib-type">${esc(b.type)}</span>` : ''}
          </div>
          <div class="lib-grid-host">${esc(hostname(b.url))}${b.author ? ` · ${esc(b.author)}` : ''}</div>
          ${b.summary ? `<p class="lib-grid-summary">${esc(b.summary)}</p>` : ''}
          ${b.topics?.length ? `<div class="lib-topics">${b.topics.slice(0, 6).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
        </div>
      </div>
    `).join('');
    gridEl.querySelectorAll('.lib-grid-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (!e.target.closest('.more-btn-list')) openLibraryModal(card.dataset.id);
      });

  // ONE generic, descriptor-driven detail modal that SCALES to what each board uses:
  // screenshot only if present, tags as chips, a highlighted lead field, the AI fields
  // as a read-only grid, and an editable section (your non-AI fields + notes) with Save
  // — notes always available, so even a plain bookmark board gets a clean editable card.
  let modalLastFocused = null;
  const MODAL_EDITABLE_TYPES = new Set(['text', 'number', 'date', 'url', 'enum', 'tags']);
  function modalHasVal(v) { return Array.isArray(v) ? v.length > 0 : v !== null && v !== undefined && v !== ''; }

  function modalEditInput(field, value) {
    const k = esc(field.key), t = field.type;
    const common = `class="reflection-input" data-edit-key="${k}" data-edit-type="${esc(t)}" style="margin:0"`;
    if (t === 'enum') {
      const opts = ['<option value=""></option>', ...(field.values || []).map(v => `<option value="${esc(v)}"${value === v ? ' selected' : ''}>${esc(v)}</option>`)].join('');
      return `<select ${common}>${opts}</select>`;
    }
    if (t === 'tags') return `<input ${common} value="${esc((Array.isArray(value) ? value : []).join(', '))}" placeholder="comma, separated">`;
    if (t === 'number') return `<input ${common} type="number" value="${value == null ? '' : esc(String(value))}">`;
    if (t === 'date') return `<input ${common} type="date" value="${esc(String(value || ''))}">`;
    if (t === 'url') return `<input ${common} type="url" value="${esc(String(value || ''))}">`;
    return `<textarea ${common} rows="2" placeholder="${esc(field.label)}…">${esc(String(value || ''))}</textarea>`;
  }

  function openItemModal(id) {
    const item = bookmarks.find(b => b.id === id);
    if (!item) return;
    currentBookmark = item;
    modalLastFocused = document.activeElement;
    const descriptor = (collections.find(c => c.id === activeCollection) || {}).descriptor;
    const rh = window.renderHelpers || {};
    const ch = window.collectionHelpers || {};
    const entries = (descriptor && ch.itemFieldEntries) ? ch.itemFieldEntries(item, descriptor) : [];

    // Editable = your (enrichable:false) fields — taken from the DESCRIPTOR so EMPTY
    // ones still render an input to fill (itemFieldEntries drops empties, which is right
    // for read-only AI fields but would hide a blank "my rating" you want to set).
    const editableFields = ((descriptor && descriptor.fields) || []).filter(f => f.enrichable === false && MODAL_EDITABLE_TYPES.has(f.type));
    const editableKeys = new Set(editableFields.map(f => f.key));

    // Read-only display fields (AI-filled, non-empty) — excluding the editable ones.
    const tagsEntries = [], displayEntries = [];
    for (const e of entries) {
      if (editableKeys.has(e.field.key)) continue;
      if (e.field.type === 'image') continue; // shown as the screenshot, not a field
      if (e.field.type === 'tags') { tagsEntries.push(e); continue; }
      displayEntries.push(e);
    }
    // Lead = first longish read-only text field (the "Steal This"/"Summary" highlight).
    let lead = displayEntries.find(e => e.field.type === 'text' && typeof e.value === 'string' && e.value.length > 50) || null;
    const restDisplay = displayEntries.filter(e => e !== lead && modalHasVal(e.value));

    const tierEntry = entries.find(e => /(^|\.)tier$/.test(e.field.key));
    const tierBadge = tierEntry && modalHasVal(tierEntry.value) ? `<span class="tier-badge ${esc(String(tierEntry.value))}">${esc(String(tierEntry.value))}</span>` : '';

    const allTags = tagsEntries.flatMap(e => Array.isArray(e.value) ? e.value : (modalHasVal(e.value) ? [e.value] : []));
    const tagsHtml = allTags.length ? `<div class="modal-tags">${allTags.map(t => `<span class="tag">${esc(String(t))}</span>`).join('')}</div>` : '';

    // group remaining read-only fields by dotted prefix
    const groups = new Map();
    for (const e of restDisplay) {
      const dot = e.field.key.indexOf('.');
      const g = dot > 0 ? e.field.key.slice(0, dot) : '';
      if (!groups.has(g)) groups.set(g, []);
      groups.get(g).push(e);
    }
    const displayHtml = [...groups.entries()].map(([g, es]) => `
      ${g ? `<div class="field-group-label">${esc(g)}</div>` : ''}
      <div class="design-grid">
        ${es.map(e => `<div class="design-field"><div class="field-label">${esc(e.field.label)}</div>${rh.renderField ? rh.renderField(e.field, e.value) : `<div class="field-value">${esc(String(e.value))}</div>`}</div>`).join('')}
      </div>`).join('');

    const editInputs = editableFields.map(f => `<div class="reflection-field"><div class="field-label">${esc(f.label)}</div>${modalEditInput(f, ch.getFieldValue ? ch.getFieldValue(item, f.key) : undefined)}</div>`).join('');
    const editSection = `<div class="reflection-grid" style="margin-top:16px">
        ${editInputs}
        <div class="reflection-field"><div class="field-label">Notes</div><textarea class="reflection-input" data-edit-notes rows="4" placeholder="Your notes…">${esc(item.notes || '')}</textarea></div>
      </div>`;

    const favStar = `<button id="modal-fav" title="Favorite" style="background:none;border:none;cursor:pointer;font-size:22px;line-height:1;color:${item.favorite ? 'var(--accent,#f59e0b)' : 'var(--text-3)'}">${item.favorite ? '★' : '☆'}</button>`;
    const urlSafe = rh.isSafeUrl && rh.isSafeUrl(item.url);

    const content = document.getElementById('modal-content');
    content.innerHTML = `
      ${item.screenshot ? `<img class="modal-screenshot" src="${shotSrc(item)}" alt="${esc(item.title || '')}">` : ''}
      <div class="modal-body">
        <div class="modal-title-row" style="display:flex;align-items:center;gap:10px">
          <div class="modal-title" style="flex:1">${esc(item.title || item.url || '')}</div>
          ${tierBadge}${favStar}
        </div>
        ${item.url ? `<div class="modal-url">${urlSafe ? `<a href="${esc(item.url)}" target="_blank" rel="noopener noreferrer">${esc(item.url)}</a>` : `<span>${esc(item.url)}</span>`}${item.added ? ` · ${esc(item.added)}` : ''}</div>` : ''}
        ${tagsHtml}
        ${lead ? `<div class="steal-this"><div class="field-label">${esc(lead.field.label)}</div><div class="field-value">${esc(String(lead.value))}</div></div>` : ''}
        ${displayHtml}
        ${editSection}
        <div class="modal-footer">
          <span class="save-status" id="save-status"></span>
          <button class="btn btn-ghost" id="modal-cancel">Close</button>
          <button class="btn btn-primary" id="modal-save">Save</button>
        </div>
      </div>`;
    document.getElementById('modal-cancel').onclick = closeModal;
    document.getElementById('modal-save').onclick = () => saveItemEdits(item.id);
    document.getElementById('modal-fav').onclick = () => toggleItemFavorite(item.id);

  // ── Card edge-glow (overdrive, quiet) ───────────────────────────────────────
  // A super-subtle cursor-tracked highlight on real cards in populated views: a
  // neutral glow rides the card's border where the cursor is (a gradient outline —
  // see the .grid-card::after rule), no surface wash, no color. One delegated,
  // rAF-throttled pointermove updates ONLY the hovered card's --mx/--my (never
  // loops the grid). Skipped under reduced-motion; the cards' existing :hover lift
  // and shadow carry the depth.
  (function initCardGlow() {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    let pending = null, raf = 0;
    function flush() {
      raf = 0;
      const p = pending; pending = null;
      if (!p || !p.target || !p.target.closest) return;
      const card = p.target.closest('.grid-card, .list-card, .lib-card');
      if (!card) return;
      const rect = card.getBoundingClientRect();
      card.style.setProperty('--mx', (p.x - rect.left) + 'px');
      card.style.setProperty('--my', (p.y - rect.top) + 'px');
    }
    document.addEventListener('pointermove', (e) => {
      pending = { x: e.clientX, y: e.clientY, target: e.target };
      if (!raf) raf = requestAnimationFrame(flush);
    }, { passive: true });
  })();

      });
      const data = await res.json();
      if (!res.ok) {
        status.className = 'add-status error';
        status.textContent = data.error || 'Failed';
        return;
      }
      bookmarks.unshift(data);
      input.value = '';
      status.textContent = `✓ Added ${data.title || data.url}`;
      setTimeout(() => { status.textContent = ''; }, 3000);
      if (activeCollection === 'inspiration') buildTagCloud();
      else renderLibraryTopicCloud();
      applyFilters();
    } catch (e) {
      status.className = 'add-status error';
      status.textContent = 'Network error';
    } finally {
      input.disabled = false;
      btn.disabled = false;
      agentBtn.disabled = false;
    }
  }

  // ── Context menu ──
  let ctxTargetId = null;

  function openCtxMenu(id, anchorEl) {
    ctxTargetId = id;
    closeAllPopovers();
    // "Replace screenshot" only for boards that support screenshots (visual/grid
    // boards — matches the server's upload guard). Set both ways every open: the menu
    // is one shared node, so it must re-show for Inspiration after a Library open.
    const activeCol = collections.find(c => c.id === activeCollection);
    const capable = !!(window.collectionHelpers && activeCol &&
      window.collectionHelpers.collectionChrome(activeCol).screenshot);
    document.getElementById('ctx-replace-screenshot').style.display = capable ? '' : 'none';
    const menu = document.getElementById('ctx-menu');
    const rect = anchorEl.getBoundingClientRect();
    const menuW = 140;
    const left = Math.min(rect.left, window.innerWidth - menuW - 8);
    menu.style.top = (rect.bottom + 6) + 'px';
    menu.style.left = left + 'px';
    menu.classList.add('open');
  }

  function closeCtxMenu() {
    document.getElementById('ctx-menu').classList.remove('open');
  }

  document.getElementById('ctx-refetch').addEventListener('click', (e) => {
    e.stopPropagation();
    closeCtxMenu();
    openRefetchPopover(ctxTargetId);
  });

  document.getElementById('ctx-move').addEventListener('click', (e) => {
    e.stopPropagation();
    closeCtxMenu();
    openMovePopover(ctxTargetId);
  });

  document.getElementById('ctx-delete').addEventListener('click', (e) => {
    e.stopPropagation();
    closeCtxMenu();
    openDeletePopover(ctxTargetId);
  });

  let screenshotTargetId = null;
  document.getElementById('ctx-replace-screenshot').addEventListener('click', (e) => {
    e.stopPropagation();
    closeCtxMenu();
    screenshotTargetId = ctxTargetId;
    const input = document.getElementById('screenshot-file-input');
    input.value = '';
    input.click();
  });

  document.getElementById('screenshot-file-input').addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    const id = screenshotTargetId;
    if (!file || !id) return;

    const dataUrl = await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });

    const res = await fetch(window.collectionHelpers.screenshotUrl(activeCollection, id), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dataUrl }),
    });
    if (!res.ok) {
      alert('Failed to upload screenshot');
      return;
    }
    const updated = await res.json();
    const idx = bookmarks.findIndex(b => b.id === id);
    if (idx !== -1) {
      bookmarks[idx] = { ...updated, _cacheBust: Date.now() };
    }
    applyFilters();
    if (currentBookmark && currentBookmark.id === id) {
      openModal(id);
    }
  });

  // ── Refetch popover ──
  let refetchTargetId = null;

  function openRefetchPopover(id) {
    refetchTargetId = id;
    const popover = document.getElementById('refetch-popover');
    const textarea = document.getElementById('refetch-instructions');
    textarea.value = '';
    // Center it on screen
    popover.style.top = '120px';
    popover.style.left = '50%';
    popover.style.transform = 'translateX(-50%)';
    popover.classList.add('open');
    setTimeout(() => textarea.focus(), 50);
  }

  function closeRefetchPopover() {
    document.getElementById('refetch-popover').classList.remove('open');
    refetchTargetId = null;
  }

  document.getElementById('refetch-cancel').addEventListener('click', closeRefetchPopover);

  document.getElementById('refetch-go').addEventListener('click', async () => {
    if (!refetchTargetId) return;
    const btn = document.getElementById('refetch-go');
    const instructions = document.getElementById('refetch-instructions').value.trim();
    btn.disabled = true;
    btn.textContent = 'Fetching…';
    try {
      const res = await fetch(window.collectionHelpers.refetchUrl(activeCollection, refetchTargetId), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ instructions, analysisAgent: selectedAnalysisAgent() }),
      });
      const updated = await res.json();
      if (!res.ok) { alert(updated.error || 'Refetch failed'); return; }
      const idx = bookmarks.findIndex(b => b.id === updated.id);
      if (idx !== -1) bookmarks[idx] = updated;
      if (activeCollection === 'inspiration') buildTagCloud();
      applyFilters();
      closeRefetchPopover();
    } finally {
      btn.disabled = false;
      btn.textContent = 'Refetch';
    }
  });

  document.getElementById('refetch-instructions').addEventListener('keydown', e => {
    if (e.key === 'Escape') closeRefetchPopover();
  });

  // ── Delete popover ──
  let deleteTargetId = null;

  function openDeletePopover(id) {
    deleteTargetId = id;
    const b = bookmarks.find(x => x.id === id);
    document.getElementById('delete-title').textContent = b?.title || id;
    const popover = document.getElementById('delete-popover');
    popover.style.top = '120px';
    popover.style.left = '50%';
    popover.style.transform = 'translateX(-50%)';
    popover.classList.add('open');
  }

  function closeDeletePopover() {
    document.getElementById('delete-popover').classList.remove('open');
    deleteTargetId = null;
  }

  document.getElementById('delete-cancel').addEventListener('click', closeDeletePopover);

  document.getElementById('delete-confirm').addEventListener('click', async () => {
    if (!deleteTargetId) return;
    await fetch(window.collectionHelpers.itemUrl(activeCollection, deleteTargetId), { method: 'DELETE' });
    bookmarks = bookmarks.filter(b => b.id !== deleteTargetId);
    closeDeletePopover();
    if (activeCollection === 'inspiration') buildTagCloud();
    else renderLibraryTopicCloud();
    applyFilters();
  });

  // ── Move popover ──
  let moveTargetId = null;

  function openMovePopover(id) {
    moveTargetId = id;
    const list = document.getElementById('move-list');
    // Targets = every real board except the one we're viewing. Views never appear here:
    // /api/collections returns only rows from the `board` table (views live in a
    // separate table), so this list can't corrupt a view by making it a home board.
    const targets = collections.filter(c => c.id !== activeCollection);
    if (!targets.length) {
      list.innerHTML = '<div class="move-empty">No other boards yet. Create one to file items onto.</div>';
    } else {
      list.innerHTML = targets.map(c =>
        `<button class="move-option" data-board-id="${esc(c.id)}">${esc(c.name)}</button>`
      ).join('');
      list.querySelectorAll('.move-option').forEach(btn => {
        btn.addEventListener('click', () => moveItemTo(btn.dataset.boardId));
      });
    }
    const popover = document.getElementById('move-popover');
    popover.style.top = '120px';
    popover.style.left = '50%';
    popover.style.transform = 'translateX(-50%)';
    popover.classList.add('open');
  }

  function closeMovePopover() {
    document.getElementById('move-popover').classList.remove('open');
    moveTargetId = null;
  }

  async function moveItemTo(boardId) {
    const id = moveTargetId;
    if (!id || !boardId) return;
    const target = collections.find(c => c.id === boardId);
    let body = {};
    try {
      const res = await fetch(window.collectionHelpers.moveUrl(activeCollection, id), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ boardId }),
      });
      body = await res.json().catch(() => ({}));
      // Only drop the card if the move actually took (partial failures land in
      // failed/notFound, not assigned).
      if (!res.ok || !(Array.isArray(body.assigned) && body.assigned.includes(id))) {
        alert(body.error || `Couldn't move to ${target ? target.name : boardId}.`);
        return;
      }
    } catch (e) {
      alert('Could not reach the server to move this item.');
      return;
    }
    // It now lives on another board — remove it from the current view.
    bookmarks = bookmarks.filter(b => b.id !== id);
    closeMovePopover();
    if (currentBookmark && currentBookmark.id === id) closeModal();
    if (activeCollection === 'inspiration') buildTagCloud();
    else renderLibraryTopicCloud();
    applyFilters();
  }

  // Close all popovers helper
  function closeAllPopovers() {
    closeCtxMenu();
    closeRefetchPopover();
    closeDeletePopover();
    closeMovePopover();
    closeFavPopover();
    closeAgentMenu();
  }

  // Stop propagation inside popovers so outside-click doesn't fire
  document.getElementById('refetch-popover').addEventListener('click', e => e.stopPropagation());
  document.getElementById('delete-popover').addEventListener('click', e => e.stopPropagation());
  document.getElementById('move-popover').addEventListener('click', e => e.stopPropagation());
  document.getElementById('ctx-menu').addEventListener('click', e => e.stopPropagation());
  document.getElementById('agent-menu').addEventListener('click', e => e.stopPropagation());

  // Dismiss on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('#ctx-menu') && !e.target.closest('.more-btn') && !e.target.closest('.more-btn-list')) {
      closeCtxMenu();
    }
    if (!e.target.closest('#refetch-popover')) closeRefetchPopover();
    if (!e.target.closest('#delete-popover')) closeDeletePopover();
    if (!e.target.closest('#move-popover')) closeMovePopover();
    if (!e.target.closest('#add-action')) closeAgentMenu();
  });

  document.getElementById('fav-filter-btn').addEventListener('click', () => {
    showFavoritesOnly = !showFavoritesOnly;
    document.getElementById('fav-filter-btn').classList.toggle('active', showFavoritesOnly);
    applyFilters();
  });

  document.getElementById('clear-filters-btn').addEventListener('click', () => {
    document.getElementById('search').value = '';
    document.getElementById('audience-filter').value = '';
    document.getElementById('form-filter').value = '';
    document.getElementById('domain-filter').value = '';
    activeTiers.clear();
    document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
    showFavoritesOnly = false;
    document.getElementById('fav-filter-btn').classList.remove('active');
    activeTag = null;
    libraryTopicFilter = '';
    libraryTypeFilter = '';
    const libTypeEl = document.getElementById('library-type-filter');
    if (libTypeEl) libTypeEl.value = '';
    if (activeCollection === 'inspiration') buildTagCloud();
    else renderLibraryTopicCloud();
    applyFilters();
  });

  document.getElementById('library-type-filter').addEventListener('change', e => {
    libraryTypeFilter = e.target.value;
    applyFilters();
  });

  document.getElementById('add-btn').addEventListener('click', addBookmark);
  document.getElementById('add-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addBookmark();
  });

  document.getElementById('search').addEventListener('input', applyFilters);
  document.getElementById('audience-filter').addEventListener('change', applyFilters);
  document.getElementById('form-filter').addEventListener('change', applyFilters);
  document.getElementById('domain-filter').addEventListener('change', applyFilters);
  document.getElementById('sort-select').addEventListener('change', applyFilters);

  document.querySelectorAll('.tier-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.tier;
      if (activeTiers.has(t)) { activeTiers.delete(t); btn.classList.remove('active'); }
      else { activeTiers.add(t); btn.classList.add('active'); }
      applyFilters();
    });
  });

  document.getElementById('btn-grid').addEventListener('click', () => {
    activeView = 'grid';
    document.getElementById('btn-grid').classList.add('active');
    document.getElementById('btn-list').classList.remove('active');
    document.getElementById('grid-view').style.display = '';
    document.getElementById('list-view').style.display = 'none';
    render();
  });

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
    document.documentElement.dataset.theme = next;
    localStorage.setItem('theme', next);
  });

  document.getElementById('btn-list').addEventListener('click', () => {
    activeView = 'list';
    document.getElementById('btn-list').classList.add('active');
    document.getElementById('btn-grid').classList.remove('active');
    document.getElementById('grid-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    render();
  });

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeModal();
      closeAgentMenu();
    }
  });

  // Empty-state affordances are injected as markup by renderEmptyState, so wire them
  // once via delegation rather than re-binding on every render.
  document.addEventListener('click', (e) => {
    if (e.target.closest('[data-empty-add]')) {
      const input = document.getElementById('add-input');
      input.scrollIntoView({ block: 'center', behavior: prefersReducedMotion() ? 'auto' : 'smooth' });
      input.focus();
      return;
    }
    if (e.target.closest('[data-empty-guide]')) { openWelcomeModal(); return; }
    if (e.target.closest('[data-empty-clear]')) { clearAllFilters(); return; }
    if (e.target.closest('[data-welcome-close]')) { closeModal(); return; }
  });

  function prefersReducedMotion() {
    return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  }

  // Reset every active filter/search facet, then re-render (the "Clear filters" path
  // from the filtered-to-zero empty state). Mirrors the reset in setActiveCollection.
  function clearAllFilters() {
    const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v; };
    set('search', ''); set('audience-filter', ''); set('form-filter', ''); set('domain-filter', '');
    set('library-type-filter', '');
    activeTiers.clear();
    document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
    activeTag = null;
    showFavoritesOnly = false;
    const fav = document.getElementById('fav-filter-btn'); if (fav) fav.classList.remove('active');
    libraryTopicFilter = '';
    libraryTypeFilter = '';
    applyFilters();
  }

  // The "Where to begin" guide: a short letter from the author + three first steps +
  // a link to the docs. Opened from the empty state's secondary affordance.
  function openWelcomeModal() {
    showModalContent(`
      <div class="welcome">
        <p class="welcome-eyebrow">Welcome to board</p>
        <h2 class="welcome-title">A collection with a point of view.</h2>

        <div class="welcome-section">
          <h3>Where to begin</h3>
          <ol class="welcome-steps">
            <li><b>Capture.</b> Paste a URL above, or share to your Inbox from your phone. It lands in the Inbox first.</li>
            <li><b>File it.</b> Move it onto a board. If you have wired up an LLM, it fills in the design read on the way.</li>
            <li><b>Compose.</b> Describe a board you wish existed, and let the composer build one with a stance.</li>
          </ol>
        </div>

        <div class="welcome-section">
          <h3>Worth knowing</h3>
          <div class="welcome-grid">
            <div><b>Bring your own LLM</b><span>An API key, a local model, or your Claude Code / Codex subscription.</span></div>
            <div><b>Share from your phone</b><span>Install board as an app and share any page straight to your Inbox.</span></div>
            <div><b>Archive a copy</b><span>Opt a board in and it keeps a self-contained snapshot, so a dead link still resolves.</span></div>
            <div><b>Compose by describing</b><span>Say what you collect; the AI proposes a board with a stance, not a blank form.</span></div>
            <div><b>Views, not copies</b><span>Save a live lens across every board without duplicating a single item.</span></div>
            <div><b>Yours on a file</b><span>Everything lives in one SQLite file you can copy and walk away with.</span></div>
          </div>
        </div>

        <div class="welcome-section welcome-letter">
          <p>I built board the way I wanted to keep things: a place with a point of view, not another junk drawer of links I would never open again.</p>
          <p>It started as a tool just for me. I collect designs and articles compulsively, and nothing I tried actually had taste of its own, so I taught it mine and let it read each thing back to me. What is good here, and what is worth stealing.</p>
          <p>I am opening it up because the tools I lean on every day were built by people who shared their work freely. This is me passing some of that along. It is yours to run, yours to fork, and yours to keep on a plain file you own.</p>
          <p>I found it genuinely useful. I hope you do too.</p>
          <p class="welcome-sign">Sean, the original creator of Board.</p>
        </div>

        <div class="welcome-footer">
          <a class="empty-cta" href="https://github.com/Hayawan/board" target="_blank" rel="noopener">Read the docs on GitHub</a>
          <button type="button" class="empty-link" data-welcome-close>Maybe later</button>
        </div>
      </div>
    `);
    document.getElementById('modal').classList.add('modal--welcome');
  }

  initAnalysisAgentControl();
  // load() is called by the module script below after collectionHelpers are initialized
</script>
<script type="module">
  import { resolveActiveCollection, itemsUrl, itemUrl, addUrl, refetchUrl, screenshotUrl, moveUrl, eventsUrl, collectionChrome, matchesLibraryFilters, topicCounts, selectView, itemFieldEntries, getFieldValue, buildFilters, matchesFilters, applySseEvent, renderEnrichmentState, boardPurpose, renderEmptyState, renderBoardsFallback, shouldShowEnableAiNudge } from './collections-ui.js';
  window.collectionHelpers = { resolveActiveCollection, itemsUrl, itemUrl, addUrl, refetchUrl, screenshotUrl, moveUrl, eventsUrl, collectionChrome, matchesLibraryFilters, topicCounts, selectView, itemFieldEntries, getFieldValue, buildFilters, matchesFilters, applySseEvent, renderEnrichmentState, boardPurpose, renderEmptyState, renderBoardsFallback, shouldShowEnableAiNudge };
  // Story 7.2: generic descriptor-driven field renderer (Epic 8 wires it into the
  // descriptor-driven card/modal when the UI consumes the SQLite item model).
  import { renderField, renderFields, renderAsset, isSafeUrl } from './descriptor/render-map.js';
  window.renderHelpers = { renderField, renderFields, renderAsset, isSafeUrl };
  load();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Board review lane</title>
  <style>
    :root { color-scheme: dark; }
    body { font: 14px/1.45 system-ui, sans-serif; width: 360px; margin: 0; padding: 12px; background: #0c0c0c; color: #e8e8e8; }
    h1 { font-size: 14px; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
    button { font: inherit; cursor: pointer; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #e8e8e8; padding: .35rem .6rem; }
    button.primary { background: #7c9cff; color: #0c0c0c; border-color: #7c9cff; font-weight: 600; }
    button.chip { background: #15301f; border-color: #2a6e45; color: #b6f0c9; }
    .row { border: 1px solid #1f1f1f; border-radius: 10px; padding: 8px 10px; margin: 6px 0; }
    .row .title { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row .url { color: #888; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row .actions { margin-top: 6px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    select { font: inherit; background: #1a1a1a; color: #e8e8e8; border: 1px solid #333; border-radius: 8px; padding: .3rem; }
    .muted { color: #888; }
    .bar { display: flex; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    a { color: #7c9cff; }
    #status { font-size: 12px; min-height: 16px; }
  </style>
</head>
<body>
  <h1>📥 Board — review lane</h1>
  <div class="bar">
    <button id="save" class="primary">Save this tab</button>
    <a href="#" id="open-options">Settings</a>
  </div>
  <div id="status" class="muted"></div>
  <div id="list"></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
